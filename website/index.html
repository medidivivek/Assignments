<!DOCTYPE html>
<html lang="en">
<head>
    <title>Personal Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>       

      <div class="container"> 
            <h1>Personal Profile</h1>
            <div class="image">
                <img  src="D:\website\image.png" class="image-box" alt="Profile Image">
            </div>

 
            <form>
                <label>Name:</label>
                <input type="text" name="name"><br>

                <label>Age:</label>
                <input type="number" name="age"><br>

                <label>City:</label>
                <input type="text" name="city"><br>

                <label>Gender:</label>
                <select>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select><br>

                <label>Projects:</label>
                <input type="radio" name="project"> Java <br>
                <input type="radio" name="project"> Python <br>
                <input type="radio" name="project"> AWS <br>
                <input type="radio" name="project"> Cybersecurity <br>

                <label>About You:</label>
                <textarea rows="5" placeholder="Write 5 lines...">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Aut iure maiores molestiae est veritatis eius natus perspiciatis libero esse dolore provident, beatae atque consectetur facilis iusto neque tenetur delectus sit.</textarea>
            </form>

        </div>
    

</body>
</html>
